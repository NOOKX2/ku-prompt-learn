services:
  db:
    image: postgres:16-alpine
    container_name: ku_promptlearn_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ku_promptlearn_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
      # NextAuth — ต้องมีในไฟล์ .env (ไม่ใช่แค่ .env.local) มิฉะนั้น compose/env_file จะไม่ส่งเข้า container
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env e.g. openssl rand -base64 32}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      # ในเครือข่าย Docker ชี้ service `db` พอร์ตภายใน 5432 เสมอ
      DB_HOST: db
      DB_PORT: "5432"
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-ku_prompt_learn}
    # dev:docker ใช้ --webpack เพื่อหลีกเลี่ยง Turbopack + Prisma client ที่ prisma.summary หาย
    # ถ้า migrate ค้าง P3009: เช็คว่า migration นั้นใช้แล้วจริงหรือยัง แล้ว resolve
    # - Summary: `docker compose run --rm app bun run db:migrate:resolve-summary-applied` (หรือ ...rolled-back)
    # - exam isPublic: `docker compose run --rm app bun run db:migrate:resolve-exam-is-public-applied` (หรือ ...rolled-back)
    # - summary isPublic: `docker compose run --rm app bunx prisma migrate resolve --applied 20260425130000_summary_is_public`
    # - review_plan isPublic: `docker compose run --rm app bunx prisma migrate resolve --applied 20260425140000_review_plan_is_public`
    command: sh -c "bun install && bunx prisma migrate deploy && bunx prisma generate && bun run dev:docker"
    restart: unless-stopped

  studio:
    image: oven/bun:1
    container_name: ku_prompt_learn_prisma_studio
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "bun install && bunx prisma studio --hostname 0.0.0.0 --port 5555 --browser none"
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-ku_prompt_learn}
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
